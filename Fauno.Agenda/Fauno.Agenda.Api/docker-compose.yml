services:
  agenda-api:
    build:
      context: ..
      dockerfile: Fauno.Agenda.Api/Dockerfile

    container_name: fauno-agenda-api

    networks:
      - fauno-network

    ports:
      - "8081:8080"

    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Server=agenda-mysql;Port=3306;Database=fauno_agenda;User=root;Password=mysql123;
      - RegisterApi__BaseUrl=http://register-api:8080/api/cadastros/

    depends_on:
      agenda-mysql:
        condition: service_healthy

    restart: on-failure

  agenda-mysql:
    image: mysql:8.4
    container_name: fauno-agenda-mysql

    networks:
      - fauno-network

    environment:
      MYSQL_DATABASE: fauno_agenda
      MYSQL_ROOT_PASSWORD: mysql123

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pmysql123"]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

networks:
  fauno-network:
    external: true

volumes:
  mysql_data: