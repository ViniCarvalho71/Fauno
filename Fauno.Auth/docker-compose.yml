services:
  db:
    image: mysql:8.0
    container_name: fauno-auth-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: faunoauthdb
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      - "3306:3306"
    volumes:
      - faunoauth_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$MYSQL_PASSWORD mysqladmin ping -h localhost -u$MYSQL_USER --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fauno-auth-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: server=db;port=3306;database=faunoauthdb;user=${MYSQL_USER:?MYSQL_USER is required};password=${MYSQL_PASSWORD:?MYSQL_PASSWORD is required};Persist Security Info=False;Convert Zero Datetime=True;SslMode=Preferred
    ports:
      - "8080:8080"

volumes:
  faunoauth_mysql_data:
